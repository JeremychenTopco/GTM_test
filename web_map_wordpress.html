<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<title>運動場館地圖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>
/* WordPress 內嵌通用設定 */
#sports-map-wrapper {
  width: 100%;
  display: flex;
  justify-content: center;
}

#map {
  width: 800px;
  height: 800px;
  max-width: 100%;
}

/* 去除 Leaflet 預設 focus / 外框 */
.leaflet-interactive:focus {
  outline: none;
  box-shadow: none;
}

/* Cluster 樣式 */
.marker-cluster {
  border-radius: 50%;
  color: #fff;
  font-weight: bold;
}

/* Hover Tooltip：橘底白字 20px */
.leaflet-tooltip.custom-tooltip {
  background: #ff8c00;
  color: #ffffff;
  font-size: 20px;
  font-weight: bold;
  border: none;
  border-radius: 6px;
  padding: 6px 10px;
  box-shadow: none;
  white-space: nowrap;
}
</style>
</head>

<body>

<div id="sports-map-wrapper">
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
// ---------- 工具函式 ----------
function lerp(value, min1, max1, min2, max2) {
  return min2 + ((value - min1) * (max2 - min2)) / (max1 - min1);
}

function getColorByCount(count) {
  var max = 10;
  var n = Math.min(count, max) / max;
  var sat = lerp(n, 0, 1, 50, 100);
  var light = lerp(n, 0, 1, 70, 40);
  return `hsl(0, ${sat}%, ${light}%)`;
}

function getRadiusByCount(count) {
  var max = 10;
  var n = Math.min(count, max) / max;
  return lerp(n, 0, 1, 15, 30);
}

// ---------- 地圖初始化 ----------
var map = L.map('map', {
  center: [23.7, 121],
  zoom: 7,
  minZoom: 7,
  scrollWheelZoom: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap & CartoDB'
}).addTo(map);

// ---------- 場館資料 ----------
var venues = [
  { name:"臺北市崇越總部內湖運動訓練中心", lat:25.0809, lng:121.5756 },
  { name:"臺北市信義運動中心", lat:25.0329, lng:121.5654 },
  { name:"永春活力館", lat:25.0405, lng:121.5759 },
  { name:"臺北市天母運動訓練館", lat:25.1367, lng:121.4660 },
  { name:"榮星花園游泳池", lat:25.0615, lng:121.5338 },
  { name:"新北市臺北大學運動中心", lat:24.9433, lng:121.3702 },
  { name:"新北市三峽運動中心", lat:24.9345, lng:121.3720 },
  { name:"新北市鶯歌運動中心", lat:24.9568, lng:121.3526 },
  { name:"桃園市八德社宅微型運動館", lat:24.9295, lng:121.2960 },
  { name:"臺中市豐原國民暨兒童運動中心", lat:24.2520, lng:120.7223 }
];

// ---------- Marker Cluster ----------
var markers = L.markerClusterGroup({
  iconCreateFunction: function(cluster) {
    var count = cluster.getChildCount();
    var r = getRadiusByCount(count);
    var c = getColorByCount(count);

    return L.divIcon({
      html: `<div style="
        background:${c};
        width:${r*2}px;
        height:${r*2}px;
        line-height:${r*2}px;
        border-radius:50%;
        color:white;
        font-size:${r*0.8}px;
        text-align:center;
        font-weight:bold;
      ">${count}</div>`,
      className: 'marker-cluster',
      iconSize: L.point(r*2, r*2)
    });
  }
});

// ---------- Marker ----------
venues.forEach(function(v) {
  var marker = L.circleMarker([v.lat, v.lng], {
    radius: 8,
    fillColor: "#ff4d4d",
    color: "transparent",
    weight: 0,
    fillOpacity: 0.7
  });

  // Hover Tooltip（不點擊、不跳站）
  marker.bindTooltip(v.name, {
    direction: 'top',
    className: 'custom-tooltip',
    offset: [0, -8],
    opacity: 1
  });

  marker.on('mouseover', function() {
    this.setStyle({ fillColor: '#ff8c00' });
    this.openTooltip();
  });

  marker.on('mouseout', function() {
    this.setStyle({ fillColor: '#ff4d4d' });
    this.closeTooltip();
  });

  markers.addLayer(marker);
});

map.addLayer(markers);
</script>

</body>
</html>
